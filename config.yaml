version: 2
                                                                                                                                     
logging:                                                                                                                           
  level: DEBUG

routing:
  latency_threshold_ms: 2000

#  routes:
#    - id: manager
#      model: qwen/qwen3-coder:free
#    - id: dev
#      model: qwen/qwen3-coder:free
#    - id:  qa
#      model: qwen/qwen3-coder:free

providers:

  - id: openrouter-1
    type: openai-compatible
    endpoint: https://openrouter.ai/api
    api_key: ${OPENROUTER_API_KEY}
    limits:
      requests: 200
      window: 1m
      concurrent_requests: 10   # max 10 requests in-flight at once (0 = unlimited)
    recovery_window: 15m
    models:
      - id: openrouter/free
        is_free: true
        limits:
          - requests: 20
            window: 1m
          - requests: 50
            window: 24h

  - id: kilo-1
    type: openai-compatible
    endpoint: https://api.kilo.ai/api/gateway
    chat_path: /chat/completions
    api_key: ${KILO_API_KEY}
    limits:
      requests: 20
      window: 24h
    recovery_window: 15m
    models:
      - id: openrouter/auto
        is_free: true
      - id: mistral/mistral-small
        is_free: true
      - id: google/gemini-2.0-flash
        is_free: true

  - id: groq-1
    type: openai-compatible
    endpoint: https://api.groq.com/openai/v1
    api_key: ${GROQ_API_KEY}
    limits:
      requests: 100
      window: 1m
    recovery_window: 10m
    models:
      - id: llama-3.1-8b-instant
        is_free: true
      - id: llama-3.3-70b-versatile
        is_free: true

  - id: nvidia-1
    type: openai-compatible
    endpoint: https://integrate.api.nvidia.com/v1
    limits:
      requests: 40
      window: 1m
    recovery_window: 10m
    models:
      - id: mistralai/devstral-2-123b-instruct-2512
        api_key: ${NVIDIA_API_KEY}
        is_free: true
        temperature: 0.15
        top_p: 0.95
        max_tokens: 8192
        seed: -1

  - id: github-models-1
    type: openai-compatible
    endpoint: https://models.github.ai
    chat_path: /inference/chat/completions
    api_key: ${GITHUB_TOKEN}
    limits:
      requests: 15
      window: 1m
    recovery_window: 15m
    models:
      - id: openai/gpt-5
        is_free: true
      - id: gpt-4o
        is_free: true
      - id: meta-llama/llama-4-maverick
        is_free: true

  # --- Remote: rate-limited direct APIs ---
  - id: mistral-1
    type: openai-compatible
    endpoint: https://api.mistral.ai/v1
    api_key: ${MISTRAL_API_KEY}
    limits:
      requests: 10
      window: 1m
    recovery_window: 15m
    models:
      - id: mistral-small-latest
        is_free: true
      - id: open-mistral-nemo
        is_free: true

  - id: google-1
    type: google
    api_key: ${GOOGLE_API_KEY}
    recovery_window: 15m
    models:
      - id: gemini-2.5-flash
        is_free: true
        limits:
          - requests: 15
            window: 1m
          - requests: 1500
            window: 24h
      - id: gemini-3-flash
        is_free: true
        limits:
          - requests: 10
            window: 1m
          - requests: 1000
            window: 24h
      - id: gemma-4-31b-it
        is_free: true
        limits:
          - requests: 5
            window: 1m
          - requests: 1000
            window: 24h
      - id: gemma-4-26b-a4b-it
        is_free: true
        limits:
          - requests: 10
            window: 1m
          - requests: 1500
            window: 24h
      - id: gemini-2.5-flash-lite
        is_free: true
        limits:
          - requests: 30
            window: 1m
          - requests: 1500
            window: 24h
      - id: gemini-3.1-flash-lite
        is_free: true
        limits:
          - requests: 15
            window: 1m
          - requests: 1500
            window: 24h
      - id: gemma-3-27b-it
        is_free: true
        limits:
          - requests: 15
            window: 1m
          - requests: 2000
            window: 24h
      - id: gemma-3-12b-it
        is_free: true
        limits:
          - requests: 30
            window: 1m
          - requests: 5000
            window: 24h
      - id: gemma-3-4b-it
        is_free: true
        limits:
          - requests: 60
            window: 1m
          - requests: 10000
            window: 24h

  - id: cohere-1
    type: cohere
    endpoint: https://api.cohere.com/
    api_key: ${COHERE_API_KEY}
    limits:
      requests: 20
      window: 1m
    recovery_window: 15m
    models:
      - id: command-a-03-2025
        is_free: true
      - id: command-r7b-12-2024
        is_free: true

