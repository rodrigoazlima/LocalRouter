version: 2

routing:
  default_model: qwen3-coder-next
  latency_threshold_ms: 2000

providers:
  # --- Local nodes (priority 1-9) ---
  - id: ollama-local
    type: ollama
    endpoint: http://localhost:11434
    timeout_ms: 30000
    stream_timeout_ms: 3600000
    recovery_window: 2m
    models:
      - id: qwen3-coder-next
        priority: 1
        is_free: true

  - id: lmstudio-local
    type: openai-compatible
    endpoint: http://localhost:1234
    timeout_ms: 30000
    stream_timeout_ms: 3600000
    recovery_window: 2m
    models:
      - id: qwen3-coder-next
        priority: 2
        is_free: true

  - id: vllm-local
    type: openai-compatible
    endpoint: http://localhost:8000
    api_key: ${VLLM_KEY}
    timeout_ms: 3000
    recovery_window: 2m
    models:
      - id: llama3.2:latest
        priority: 4
        is_free: true

  # --- Remote: free aggregators (priority 10-19) ---
  - id: openrouter-1
    type: openai-compatible
    endpoint: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_KEY}
    limits:
      requests: 200
      window: 1h
    recovery_window: 15m
    models:
      - id: meta-llama/llama-3.2-3b-instruct:free
        priority: 10
        is_free: true
      - id: meta-llama/llama-3.3-70b-instruct:free
        priority: 11
        is_free: true
      - id: deepseek/deepseek-r1:free
        priority: 12
        is_free: true
      - id: google/gemini-2.0-flash-exp:free
        priority: 13
        is_free: true
      - id: moonshotai/kimi-k2:free
        priority: 14
        is_free: true

  # --- Remote: high-RPM free inference (priority 20-29) ---
  - id: groq-1
    type: openai-compatible
    endpoint: https://api.groq.com/openai/v1
    api_key: ${GROQ_KEY}
    limits:
      requests: 100
      window: 1m
    recovery_window: 10m
    models:
      - id: llama-3.1-8b-instant
        priority: 20
        is_free: true
      - id: llama-3.3-70b-versatile
        priority: 21
        is_free: true

  - id: nvidia-1
    type: openai-compatible
    endpoint: https://integrate.api.nvidia.com/v1
    limits:
      requests: 40
      window: 1m
    recovery_window: 10m
    models:
      - id: mistralai/devstral-2-123b-instruct-2512
        api_key: ${NVIDIA_KEY}
        priority: 25
        is_free: true
        temperature: 0.15
        top_p: 0.95
        max_tokens: 8192
        seed: 42

  - id: github-models-1
    type: openai-compatible
    endpoint: https://models.github.ai
    chat_path: /inference/chat/completions
    api_key: ${GITHUB_TOKEN}
    limits:
      requests: 50
      window: 1m
    recovery_window: 15m
    models:
      - id: openai/gpt-5
        priority: 24
        is_free: true
      - id: gpt-4o
        priority: 25
        is_free: true
      - id: meta-llama/llama-4-maverick
        priority: 26
        is_free: true

  # --- Remote: rate-limited direct APIs (priority 30-39) ---
  - id: mistral-1
    type: openai-compatible
    endpoint: https://api.mistral.ai/v1
    api_key: ${MISTRAL_KEY}
    limits:
      requests: 10
      window: 1m
    recovery_window: 15m
    models:
      - id: mistral-small-latest
        priority: 30
        is_free: true
      - id: open-mistral-nemo
        priority: 31
        is_free: true

  - id: google-1
    type: google
    api_key: ${GOOGLE_KEY}
    limits:
      requests: 10
      window: 1m
    recovery_window: 15m
    models:
      - id: gemini-2.0-flash
        priority: 32
        is_free: true
      - id: gemini-1.5-flash
        priority: 33
        is_free: true

  - id: cohere-1
    type: cohere
    api_key: ${COHERE_KEY}
    limits:
      requests: 20
      window: 1m
    recovery_window: 15m
    models:
      - id: command-r
        priority: 34
        is_free: true
      - id: command-r-plus
        priority: 35
        is_free: true

  - id: zhipu-1
    type: openai-compatible
    endpoint: https://open.bigmodel.cn/api/paas/v4
    api_key: ${ZHIPU_KEY}
    limits:
      requests: 20
      window: 1m
    recovery_window: 15m
    models:
      - id: glm-4-flash
        priority: 36
        is_free: true

